name: "fastdoc"
description: "AI-powered documentation generator for your codebase"
author: "Mbemdia Saliou Mohamed"

branding:
  icon: "file-text"
  color: "yellow"

inputs:
  api-key:
    description: "Anthropic API key"
    required: true
  output-format:
    description: "Output format: md, json, all"
    required: false
    default: "md"
  output-dir:
    description: "Output directory"
    required: false
    default: "./docs"
  language:
    description: "Documentation language: en, fr"
    required: false
    default: "en"
  commit-docs:
    description: "Automatically commit generated docs"
    required: false
    default: "true"
  source-dir:
    description: "Source directory to analyze"
    required: false
    default: "src"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install fastdoc
      shell: bash
      run: npm install -g fastdoc

    - name: Create .fastdocrc
      shell: bash
      run: |
        cat > .fastdocrc << EOF
        {
          "language": "auto",
          "output": ["${{ inputs.output-format }}"],
          "outDir": "${{ inputs.output-dir }}",
          "include": ["${{ inputs.source-dir }}/**/*"],
          "exclude": ["node_modules", "dist", "*.test.ts"],
          "ai": {
            "model": "claude-sonnet-4-20250514",
            "language": "${{ inputs.language }}"
          }
        }
        EOF

    - name: Generate documentation
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.api-key }}
      run: fastdoc generate --output ${{ inputs.output-format }} --out-dir ${{ inputs.output-dir }}

    - name: Commit documentation
      if: ${{ inputs.commit-docs == 'true' }}
      shell: bash
      run: |
        git config --local user.email "fastdoc[bot]@users.noreply.github.com"
        git config --local user.name "fastdoc[bot]"
        git add ${{ inputs.output-dir }}
        git diff --staged --quiet || git commit -m "docs: auto-generate documentation [fastdoc]"
        git push